apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: expensy-ingress
  namespace: expensy
spec:
  ingressClassName: nginx
  rules:
    - host: 20.82.53.32.nip.io
      http:
        paths:

          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8706

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                  name: prometheus
                  port:
                       number: 9090        