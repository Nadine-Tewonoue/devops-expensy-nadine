name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/expensy-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/expensy-frontend

jobs:

# ============================================
# Stage 1: Docker Build & Push
# ============================================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: image-tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./expensy_backend
          file: ./expensy_backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./expensy_frontend
          file: ./expensy_frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ============================================
# Stage 2: Deploy to Staging
# ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy Full Stack
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASS: ${{ secrets.MONGO_PASS }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASS: ${{ secrets.GRAFANA_PASS }}
          # Server-side API URL (internal K8s DNS, not public)
          API_URL: ${{ secrets.API_URL }}
          # CORS: allow requests from the public frontend IP
          ALLOWED_ORIGINS: ${{ secrets.NEXT_PUBLIC_API_URL }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
        run: |
          kubectl apply -f k8s/namespace.yaml

          # Infra
          kubectl apply -f k8s/mongo-pvc.yaml -n expensy
          kubectl apply -f k8s/mongo.yaml -n expensy
          kubectl apply -f k8s/redis.yaml -n expensy

          # Monitoring
          kubectl apply -f k8s/node-exporter.yaml -n expensy
          kubectl apply -f k8s/grafana-pvc.yaml -n expensy

          # Secrets (envsubst replaces all env vars above)
          envsubst < k8s/secrets.yaml | kubectl apply -f - -n expensy

          # Monitoring Deployments
          kubectl apply -f k8s/grafana.yaml -n expensy
          kubectl apply -f k8s/prometheus-ingress.yaml -n expensy

          # App Deployments
          kubectl apply -f k8s/backend.yaml -n expensy
          kubectl apply -f k8s/frontend.yaml -n expensy
          kubectl apply -f k8s/ingress.yaml -n expensy

          # Update Images
          kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${IMAGE_TAG} -n expensy
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG} -n expensy

          # Wait for Rollouts
          kubectl rollout status deployment/backend -n expensy --timeout=300s
          kubectl rollout status deployment/frontend -n expensy --timeout=300s
          kubectl rollout status deployment/grafana -n expensy --timeout=300s

# ============================================
# Stage 3: Deploy to Production
# ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - docker-build-push
      - deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy Full Stack
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASS: ${{ secrets.MONGO_PASS }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASS: ${{ secrets.GRAFANA_PASS }}
          # Server-side API URL (internal K8s DNS, not public)
          API_URL: ${{ secrets.API_URL }}
          # CORS: allow requests from the public frontend IP
          ALLOWED_ORIGINS: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl apply -f k8s/mongo-pvc.yaml -n expensy
          kubectl apply -f k8s/mongo.yaml -n expensy
          kubectl apply -f k8s/redis.yaml -n expensy

          kubectl apply -f k8s/node-exporter.yaml -n expensy
          kubectl apply -f k8s/grafana-pvc.yaml -n expensy

          envsubst < k8s/secrets.yaml | kubectl apply -f - -n expensy

          kubectl apply -f k8s/grafana.yaml -n expensy
          kubectl apply -f k8s/prometheus-ingress.yaml -n expensy

          kubectl apply -f k8s/backend.yaml -n expensy
          kubectl apply -f k8s/frontend.yaml -n expensy
          kubectl apply -f k8s/ingress.yaml -n expensy

          kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${IMAGE_TAG} -n expensy
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG} -n expensy

          kubectl rollout status deployment/backend -n expensy --timeout=300s
          kubectl rollout status deployment/frontend -n expensy --timeout=300s
          kubectl rollout status deployment/grafana -n expensy --timeout=300s

      - name: Verify Deployment
        run: |
          kubectl get pods -n expensy
          kubectl get services -n expensy